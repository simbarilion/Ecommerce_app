{% extends "base.html" %}

{% block title %}Форма статьи{% endblock %}

{% block content %}
    <section class="container mx-auto p-6">
        {% include "blog/includes/blogpost_editor_header.html" %}

        <div class="col-lg-8 col-md-6 col-sm-12 mx-auto">
            <div class="card shadow-sm border-0 rounded-3 edit-form">
                <div class="card-header bg-primary text-white text-center py-3 rounded-top">
                    <h4 class="my-0 fw-semibold">Форма статьи</h4>
                </div>
                <div class="card-body px-5 py-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4 gap-3">
                            <div class="flex-grow-1 text-center">
                                <button type="submit" class="btn btn-success px-4">
                                    Сохранить
                                </button>
                                <a href="{% url 'blog:blogpost_list' %}" class="btn btn-outline-secondary px-4 mx-3">
                                    Отмена
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </section>
{% endblock %}
